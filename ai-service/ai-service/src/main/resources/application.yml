spring:
  application:
    name: ai-service
  datasource:
    url: jdbc:postgresql://postgres-ai-db:5432/ai_db
    username: postgres
    password: ${POSTGRES_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        time_zone: Asia/Ho_Chi_Minh
  ai:
    openai:
      api-key: ${SPRING_AI_OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o
          temperature: 0.7
          max-tokens: 4000

claude:
  api:
    key: ${CLAUDE_API_KEY:}

server:
  port: 9006

eureka:
  instance:
    hostname: ai-service
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

jwt:
  secret: ${JWT_SECRET}

grpc:
  task-service:
    # Set to true to use gRPC, false to use REST (Feign)
    enabled: ${GRPC_ENABLED:false}
    host: ${GRPC_TASK_SERVICE_HOST:task-service}
    port: ${GRPC_TASK_SERVICE_PORT:9090}
