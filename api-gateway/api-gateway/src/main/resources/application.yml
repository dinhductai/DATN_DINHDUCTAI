server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service-route
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
          filters:
            - RewritePath=/api/users/(?<segment>.*), /api/users/${segment}
        - id: user-service-v1-route
          uri: lb://user-service
          predicates:
            - Path=/api/v1/users/**
          filters:
            - RewritePath=/api/v1/users/(?<segment>.*), /api/users/${segment}
        - id: user-service-v1-departments-route
          uri: lb://user-service
          predicates:
            - Path=/api/v1/departments/**
          filters:
            - RewritePath=/api/v1/(?<segment>.*), /api/${segment}
        - id: email-service-route
          uri: lb://email-service
          predicates:
            - Path=/api/emails/**
        - id: product-service-route
          uri: lb://product-service
          predicates:
            - Path=/api/products/**
        - id: auth-service-route
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
        - id: task-service-route
          uri: lb://task-service
          predicates:
            - Path=/api/tasks/**
          filters:
            - RewritePath=/api/tasks/(?<segment>.*), /api/tasks/${segment}
        - id: task-service-v1-route
          uri: lb://task-service
          predicates:
            - Path=/api/v1/tasks/**
          filters:
            - RewritePath=/api/v1/tasks/(?<segment>.*), /api/tasks/${segment}
        - id: task-service-websocket-route
          uri: lb:ws://task-service
          predicates:
            - Path=/ws/**
          filters:
            - RewritePath=/ws/(?<segment>.*), /ws/${segment}
        - id: task-service-notifications-route
          uri: lb://task-service
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - RewritePath=/api/v1/notifications/(?<segment>.*), /api/notifications/${segment}
        - id: task-service-notifications-v1-compat-route
          uri: lb://task-service
          predicates:
            - Path=/api/notifications/**
          filters:
            - RewritePath=/api/notifications/(?<segment>.*), /api/notifications/${segment}
        - id: ai-service-route
          uri: lb://ai-service
          predicates:
            - Path=/api/ai/**

eureka:
  instance:
    hostname: api-gateway
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

jwt:
  secret: ${JWT_SECRET}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
