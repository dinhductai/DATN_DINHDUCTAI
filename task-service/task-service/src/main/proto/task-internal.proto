syntax = "proto3";

package microsv.task.internal;

option java_multiple_files = true;
option java_package = "com.microsv.task_service.grpc.proto";
option java_outer_classname = "TaskInternalProto";

// ============================================================
// ENUMS
// ============================================================

enum GrpcTaskStatus {
  TASK_STATUS_UNSPECIFIED = 0;
  TODO = 1;
  IN_PROGRESS = 2;
  DONE = 3;
  CANCELLED = 4;
}

enum GrpcPriorityLevel {
  PRIORITY_UNSPECIFIED = 0;
  LOW = 1;
  MEDIUM = 2;
  HIGH = 3;
}

// ============================================================
// REQUEST / RESPONSE
// ============================================================

message GetTasksRequest {
  int64 user_id = 1;
}

message TaskProto {
  int64 task_id = 1;
  string title = 2;
  string description = 3;
  string deadline = 4;       // ISO-8601 string, e.g. "2026-05-13T14:30:00+07:00"
  GrpcTaskStatus status = 5;
  GrpcPriorityLevel priority = 6;
  string start_time = 7;     // ISO-8601 string
  string created_at = 8;     // ISO-8601 string
  string completed_at = 9;   // ISO-8601 string (empty if not done)
  int64 user_id = 10;
  bool is_event = 11;
  int64 event_id = 12;
  string event_description = 13;
  string link_event = 14;
  string location = 15;
  bool is_online = 16;
  int32 reminder_minutes_before = 17;
  repeated string invited_emails = 18;
}

message GetTasksResponse {
  repeated TaskProto tasks = 1;
}

// ============================================================
// SERVICE
// ============================================================

service TaskInternalGrpcService {
  // Equivalent to GET /internal/tasks
  // Returns all tasks for a given user.
  rpc GetTasks(GetTasksRequest) returns (GetTasksResponse);
}
