spring:
  application:
    name: task-service
  datasource:
    url: jdbc:postgresql://postgres-task-db:5432/task_db
    username: postgres
    password: ${POSTGRES_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        time_zone: Asia/Ho_Chi_Minh
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

server:
  port: 9007

grpc:
  server:
    port: ${GRPC_SERVER_PORT:9090}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

eureka:
  instance:
    hostname: task-service
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

jwt:
  secret: ${JWT_SECRET}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

vapid:
  public:
    key: ${VAPID_PUBLIC_KEY:}
  private:
    key: ${VAPID_PRIVATE_KEY:}

spring.data.redis:
  host: ${REDIS_HOST:localhost}
  port: ${REDIS_PORT:6379}
  password: ${REDIS_PASSWORD:}
  timeout: 5000ms

claude:
  api:
    key: ${CLAUDE_API_KEY:}
    # Set to true to use Claude AI for task JSON conversion (incurs API cost).
    # Set to false to use local Java conversion (free, faster).
    ai-conversion-enabled: false
